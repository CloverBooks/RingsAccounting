name: Central-Books CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Separation guardrails
        run: ../scripts/guardrails/check_separation.sh

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests
        run: pytest

      - name: Start server and check /healthz
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          UVICORN_PID=$!
          sleep 2
          curl -f http://127.0.0.1:8000/healthz
          kill $UVICORN_PID

  rust-api-tests:
    name: Rust API Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rust-api

    env:
      DATABASE_URL: sqlite:./target/ci.db
      LLM_MODE: mock
      TOOL_MODE: mock
      ENGINE_LLM_ALLOWED_MODELS: stub
      ENGINE_ALLOWLIST_DOMAINS: example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Separation guardrails
        run: ../scripts/guardrails/check_separation.sh

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features sqlite --locked

      - name: Run SQLx migrations
        run: |
          mkdir -p target
          touch target/ci.db
          sqlx migrate run

      - name: Run tests
        run: cargo test

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

  api-build:
    name: API Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json
        continue-on-error: true

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate --schema=../../prisma/schema.prisma

      - name: Build API
        run: npm run build

      - name: Run tests
        run: npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: apps/customer
            short_name: customer
          - app: apps/admin
            short_name: admin

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Separation guardrails
        run: ../../scripts/guardrails/check_separation.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ matrix.short_name }}
          path: ${{ matrix.app }}/dist/
          retention-days: 7
