services:
  - type: web
    name: central-books-api
    env: python
    plan: starter
    buildCommand: |
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_DEV_USER
        value: "false"
      - key: DATABASE_URL
        value: <set-in-render>
      - key: CORS_ORIGINS
        value: https://app.<domain>,https://admin.<domain>
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: COOKIE_DOMAIN
        value: .<domain>

  - type: web
    runtime: static
    name: rings-customer
    rootDir: apps/customer
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: rings-admin
    rootDir: apps/admin
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
